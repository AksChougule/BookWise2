quotes:
  - text: "Reading widens your world before you ever leave your chair. A good book helps you return to your own life with better questions."
    attribution: "BookWise"
  - text: "Every chapter is a small investment in future clarity. What you learn now compounds in conversations, decisions, and ideas."
    attribution: "BookWise"
  - text: "Books let you borrow perspective without borrowing risk. You can test bold ideas safely, then apply what works."
    attribution: "BookWise"
  - text: "A steady reading habit builds calm focus in noisy times. It gives your attention a place to deepen instead of scatter."
    attribution: "BookWise"
  - text: "The right book can shorten years of trial and error. It offers patterns you can recognize and reuse in your own path."
    attribution: "BookWise"
